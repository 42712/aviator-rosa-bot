<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel Aviator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Segoe UI', sans-serif;
    width: 320px;
    background: #0f1923;
    color: #fff;
    padding: 16px;
}
h1 { font-size: 18px; margin-bottom: 12px; color: #00e676; }
.status {
    background: #1a2936;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 12px;
}
.status-item {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
}
.label { color: #8899aa; }
.conectado { color: #00e676; }
.desconectado { color: #ff5252; }
.btn {
    width: 100%;
    padding: 10px;
    background: #2d7d46;
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
}
.btn:hover { background: #3a9e5a; }
.info { font-size: 12px; color: #667788; margin-top: 10px; text-align: center; }
</style>
</head>
<body>
<h1>✈️ Coletor Aviator</h1>

<div class="status">
    <div class="status-item">
        <span class="label">Extensão</span>
        <span id="statusExt" class="conectado">Ativa</span>
    </div>
    <div class="status-item">
        <span class="label">Servidor</span>
        <span id="statusServer" class="desconectado">Verificando...</span>
    </div>
    <div class="status-item">
        <span class="label">Última vela</span>
        <span id="ultimaVela">—</span>
    </div>
    <div class="status-item">
        <span class="label">Velas enviadas</span>
        <span id="totalVelas">0</span>
    </div>
</div>

<button class="btn" id="btnTestar">Testar Conexão</button>
<div class="info">Celular precisa estar na página do Aviator da Sorte da Bet</div>

<script>
const SERVER = "https://painel-aviator.onrender.com";
let totalEnviadas = parseInt(localStorage.getItem('totalVelas') || '0');
document.getElementById('totalVelas').textContent = totalEnviadas;

document.getElementById('btnTestar').onclick = () => {
    fetch(SERVER + '/api/webhook/status')
        .then(r => r.json())
        .then(d => {
            const el = document.getElementById('statusServer');
            if (d.conectada) {
                el.textContent = 'Conectado ✅';
                el.className = 'conectado';
            } else {
                el.textContent = 'Aguardando...';
                el.className = 'desconectado';
            }
            if (d.total_rodadas) {
                document.getElementById('ultimaVela').textContent = d.total_rodadas + ' rodadas';
            }
        })
        .catch(() => {
            document.getElementById('statusServer').textContent = 'Offline ❌';
            document.getElementById('statusServer').className = 'desconectado';
        });
};

// Auto-verificar a cada 5s
setInterval(() => {
    document.getElementById('btnTestar').click();
}, 5000);

// Escuta mensagens do content script
chrome.runtime.onMessage.addListener((msg) => {
    if (msg.tipo === 'vela_enviada') {
        totalEnviadas++;
        localStorage.setItem('totalVelas', totalEnviadas.toString());
        document.getElementById('totalVelas').textContent = totalEnviadas;
    }
});
</script>
</body>
</html>
