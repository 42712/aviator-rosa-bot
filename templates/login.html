<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Painel Master</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:#0F0F1A; color:#fff;
    min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:#1a1a2e; border-radius:18px; padding:36px; width:100%;
    max-width:380px; border:1px solid rgba(255,255,255,0.05); }
  .logo { font-size:24px; font-weight:900; text-align:center; margin-bottom:26px;
    background:linear-gradient(135deg,#349CFF,#913EF8,#FF2D95);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .form-group { margin-bottom:16px; }
  label { display:block; font-size:11px; color:#888; margin-bottom:5px;
    font-weight:600; text-transform:uppercase; }
  input { width:100%; padding:12px 14px; background:#12121e;
    border:1px solid rgba(255,255,255,0.08); border-radius:9px; color:#fff;
    font-size:14px; outline:none; font-family:'Inter',sans-serif; }
  input:focus { border-color:#913EF8; }
  .btn { width:100%; padding:12px; background:linear-gradient(135deg,#349CFF,#913EF8);
    border:none; border-radius:9px; color:#fff; font-size:15px; font-weight:700;
    cursor:pointer; font-family:'Inter',sans-serif; }
  .erro { background:rgba(255,45,85,0.1); border:1px solid rgba(255,45,85,0.3);
    color:#FF2D55; padding:11px; border-radius:9px; font-size:13px;
    text-align:center; margin-bottom:16px; }
  .info { text-align:center; margin-top:18px; font-size:11px; color:#555; }
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">&#9992; PAINEL AVIATOR</div>
  {% if erro %}<div class="erro">{{ erro }}</div>{% endif %}
  <form method="POST">
    <div class="form-group"><label>Email</label>
      <input type="email" name="email" placeholder="seu@email.com" required></div>
    <div class="form-group"><label>Senha</label>
      <input type="password" name="senha" placeholder="********" required></div>
    <button type="submit" class="btn">ENTRAR</button>
  </form>
  <div class="info">Acesso restrito ao administrador</div>
</div>
</body>
</html>
